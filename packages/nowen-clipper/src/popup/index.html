<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Nowen Note Clipper</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <img src="../icons/icon-32.png" class="logo" alt="" />
        <h1>Nowen Note 剪藏</h1>
      </header>

      <div id="not-configured" class="panel hidden">
        <p class="warn">尚未配置服务器地址或登录账号。</p>
        <button id="open-options" class="btn primary">打开设置</button>
      </div>

      <div id="main" class="panel">
        <!-- 页面标题预览 -->
        <div id="page-title-row" class="page-title-row">
          <span id="page-title" class="page-title">加载中...</span>
        </div>

        <!-- 剪藏模式选择：下拉框 -->
        <div class="row">
          <div class="mode-select-row">
            <svg class="mode-icon" viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
              <path d="M5.5 3A2.5 2.5 0 003 5.5v9A2.5 2.5 0 005.5 17h9a2.5 2.5 0 002.5-2.5v-9A2.5 2.5 0 0014.5 3h-9zM5 5.5A.5.5 0 015.5 5h9a.5.5 0 01.5.5v9a.5.5 0 01-.5.5h-9a.5.5 0 01-.5-.5v-9z"/>
            </svg>
            <select id="clip-mode" class="mode-select">
              <option value="simplified">简化内容</option>
              <option value="article" selected>完整内容</option>
              <option value="fullpage">完全克隆</option>
              <option value="fullScreenshot">整个页面屏幕截图</option>
              <option value="screenshot">屏幕截图</option>
              <option value="selection">选区</option>
            </select>
          </div>
        </div>

        <!-- 笔记本 -->
        <div class="row">
          <div class="input-row">
            <svg class="field-icon" viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
              <path d="M4 4a2 2 0 012-2h8a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 0v12h8V4H6z"/>
            </svg>
            <input id="notebook" type="text" placeholder="Web 剪藏" autocomplete="off" />
          </div>
        </div>

        <!-- 标签 -->
        <div class="row">
          <div class="input-row">
            <svg class="field-icon" viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
              <path fill-rule="evenodd" d="M3.5 2A1.5 1.5 0 002 3.5v4.879a1.5 1.5 0 00.44 1.06l7.12 7.122a1.5 1.5 0 002.122 0l4.879-4.878a1.5 1.5 0 000-2.122L9.44 2.44A1.5 1.5 0 008.378 2H3.5zM6 6a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
            </svg>
            <input id="tags" type="text" placeholder="标签（逗号分隔）" autocomplete="off" />
          </div>
        </div>

        <!-- 添加评论 -->
        <div class="row">
          <div class="input-row comment-row">
            <svg class="field-icon comment-icon" viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
              <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/>
            </svg>
            <textarea id="comment" rows="2" placeholder="添加评论"></textarea>
          </div>
        </div>

        <!-- 剪藏按钮 -->
        <button id="clip" class="btn primary large">剪藏到 Nowen Note</button>

        <div id="progress" class="progress hidden">
          <div class="spinner"></div>
          <span id="progress-text"></span>
        </div>

        <div id="result" class="result hidden"></div>

        <!-- 快速捕捉模式 -->
        <div class="quick-capture-row">
          <label class="checkbox-label">
            <input type="checkbox" id="quick-capture" />
            <span>启用快速捕捉模式</span>
          </label>
        </div>

        <footer>
          <a href="#" id="open-options-footer">设置</a>
          <span class="dot">·</span>
          <span id="server-preview"></span>
        </footer>
      </div>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
