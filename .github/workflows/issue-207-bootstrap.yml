name: Issue 207 Bootstrap
on:
  push:
    branches: [integration/issue-207-main-ready]
permissions:
  contents: write
jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Materialize component
        shell: bash
        run: |
          python - <<'PY'
          import base64,gzip,os
          data=''
          os.makedirs('frontend/src/components',exist_ok=True)
          open('frontend/src/components/ServerConnectionCenter.tsx','wb').write(gzip.decompress(base64.b64decode(data)))
          os.remove('.github/workflows/issue-207-bootstrap.yml')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(desktop): expose server connection and NAS migration center (#207)'
          git push
