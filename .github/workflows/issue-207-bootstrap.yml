name: Issue 207 Bootstrap
on:
  push:
    branches: [integration/issue-207-main-ready]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch type narrowing
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/src/routes/user-migration-v2.ts')
          text = path.read_text()
          old = 'return tracked?.migrationId === migrationId && targetId === tracked.targetId;'
          new = 'return Boolean(tracked && tracked.migrationId === migrationId && targetId === tracked.targetId);'
          if old not in text:
              raise SystemExit('target expression not found')
          path.write_text(text.replace(old, new, 1))
          Path('.github/workflows/issue-207-bootstrap.yml').unlink()
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(migration): narrow tracked note before access (#207)'
          git push
