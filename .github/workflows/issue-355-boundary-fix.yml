name: Issue 355 Boundary Fix

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/scripts/issue355_boundary_fix.py"
      - ".github/workflows/issue-355-boundary-fix.yml"

permissions:
  contents: write

jobs:
  verify-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout PR source branch
        run: git checkout -B "${{ github.head_ref }}" "origin/${{ github.head_ref }}"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply guarded boundary fixes
        run: python .github/scripts/issue355_boundary_fix.py
      - name: Backend install
        working-directory: backend
        run: npm ci
      - name: Backend content-view tests
        working-directory: backend
        run: >-
          node --import tsx --test
          tests/markdown-user-content.test.ts
          tests/notes-content-view.test.ts
      - name: Backend typecheck
        working-directory: backend
        run: npm run build:tsc
      - name: Frontend install
        working-directory: frontend
        run: npm ci
      - name: Frontend projection and routing tests
        working-directory: frontend
        run: >-
          npm run test:run --
          src/lib/__tests__/markdownUserContent.test.ts
          src/components/__tests__/FormatAwareEditorPane.test.tsx
      - name: Frontend typecheck
        working-directory: frontend
        run: npx tsc -b
      - name: Commit verified boundary fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A backend frontend
          git commit -m "fix(api): harden note content view boundary (#355)"
          git push origin HEAD:"${{ github.head_ref }}"
