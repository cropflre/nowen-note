name: Issue 412 Embedding Profile

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/issue-412-embedding-profile.mjs"
      - ".github/workflows/issue-412-embedding-profile.yml"
      - "backend/src/services/embedding-config.ts"
      - "backend/src/services/user-ai-settings.ts"
      - "backend/src/services/ai-client.ts"
      - "backend/src/services/embedding-worker.ts"
      - "backend/src/routes/ai.ts"
      - "backend/src/routes/ai-reliable.ts"
      - "backend/tests/embedding-profile-config.test.ts"
      - "backend/tests/embedding-user-ai-settings.test.ts"
      - "backend/tests/user-ai-settings-isolation.test.ts"
      - "frontend/src/components/EmbeddingSettingsPanel.tsx"
      - "frontend/src/lib/aiReliable.ts"
      - "frontend/src/lib/embeddingProfileSelection.ts"
      - "frontend/src/lib/__tests__/embeddingProfileSelection.test.ts"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Apply implementation patch
        run: node scripts/issue-412-embedding-profile.mjs
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Backend profile and isolation tests
        working-directory: backend
        run: >-
          node --import tsx --import ./tests/setup-db-isolation.ts --test
          tests/embedding-profile-config.test.ts
          tests/embedding-user-ai-settings.test.ts
          tests/user-ai-settings-isolation.test.ts
      - name: Backend typecheck
        working-directory: backend
        run: npm run build:tsc
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Frontend embedding profile tests
        working-directory: frontend
        run: npm run test:run -- src/lib/__tests__/embeddingProfileSelection.test.ts
      - name: Frontend typecheck
        working-directory: frontend
        run: npx tsc -b
      - name: Commit verified implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/services/ai-client.ts
          git add backend/src/services/embedding-worker.ts
          git add backend/src/routes/ai.ts
          git add backend/src/routes/ai-reliable.ts
          git add backend/tests/embedding-user-ai-settings.test.ts
          git add backend/tests/user-ai-settings-isolation.test.ts
          git add frontend/src/lib/aiReliable.ts
          if ! git diff --cached --quiet; then
            git commit -m "feat(ai): bind embedding to a saved profile"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
