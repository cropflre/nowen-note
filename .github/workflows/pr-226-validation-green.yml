name: PR 226 Green Validation

on:
  pull_request:
    branches:
      - integration/pr-224-safe

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: SiYuan import and fidelity tests
        run: >-
          node --import tsx --test
          tests/siyuan-package-import.test.ts
          tests/siyuan-package-tiptap-fidelity.test.ts
          tests/siyuan-package-tag-invariants.test.ts
          tests/siyuan-tiptap-fidelity-safety.test.ts

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Focused Vitest
        run: >-
          npm run test:run --
          src/lib/__tests__/tiptapSchemaRepair.test.ts
          src/lib/__tests__/tableFidelityExtensions.test.ts
      - name: Vite production bundle
        run: npx vite build

  frontend-typecheck-delta:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Typecheck proposed branch
        shell: bash
        run: |
          cd frontend
          npm ci
          set +e
          npx tsc -b --pretty false > "$GITHUB_WORKSPACE/head-tsc.log" 2>&1
          echo $? > "$GITHUB_WORKSPACE/head-tsc.status"
          set -e
      - name: Typecheck current main
        shell: bash
        run: |
          git fetch origin main
          git worktree add ../main-worktree origin/main
          cd ../main-worktree/frontend
          npm ci
          set +e
          npx tsc -b --pretty false > "$GITHUB_WORKSPACE/main-tsc.log" 2>&1
          echo $? > "$GITHUB_WORKSPACE/main-tsc.status"
          set -e
      - name: Prepare TypeScript diagnostic delta
        shell: bash
        run: |
          grep 'error TS' head-tsc.log | sort > head-errors.txt || true
          grep 'error TS' main-tsc.log | sort > main-errors.txt || true
          echo 'Current main diagnostics:'
          cat main-errors.txt
          echo 'Proposed branch diagnostics:'
          cat head-errors.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-typecheck-delta
          path: |
            head-tsc.log
            main-tsc.log
            head-tsc.status
            main-tsc.status
            head-errors.txt
            main-errors.txt
      - name: Assert no new TypeScript diagnostics
        shell: bash
        run: diff -u main-errors.txt head-errors.txt
