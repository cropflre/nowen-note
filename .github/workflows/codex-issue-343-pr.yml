name: Codex Issue 343 PR Trigger

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: false
          show-progress: false
          ref: codex/issue-343-secure-account-profiles
      - name: Extract and apply implementation
        id: apply
        shell: bash
        run: |
          awk '
            /cat <<.B64./ { capture=1; next }
            capture && /^[[:space:]]*B64$/ { capture=0; exit }
            capture { sub(/^[[:space:]]*/, ""); print }
          ' .github/workflows/codex-issue-343-apply.yml | base64 -d | gzip -d > /tmp/codex343.py
          python - <<'PY'
          from pathlib import Path
          path = Path('/tmp/codex343.py')
          text = path.read_text()
          start_marker = "replace('frontend/src/components/ServerConnectionCenter.tsx', '''    if (!window.confirm(`删除服务端配置"
          end_marker = "replace('frontend/src/components/ServerConnectionCenter.tsx', '''      const result = await analyzeInstanceMigration"
          start = text.index(start_marker)
          end = text.index(end_marker, start)
          replacement = """replace('frontend/src/components/ServerConnectionCenter.tsx', '只删除本机保存的地址和登录令牌，不会删除服务器上的数据。', '只删除本机档案和对应安全凭据，不会删除服务器上的数据。')
          replace('frontend/src/components/ServerConnectionCenter.tsx', '    removeServerProfile(profile.id);\\n', '    await removeProfileCredential(profile.id);\\n    removeServerProfile(profile.id);\\n')
          """
          path.write_text(text[:start] + replacement + text[end:])
          PY
          python -m py_compile /tmp/codex343.py
          python /tmp/codex343.py > /tmp/codex343.log 2>&1
          python - <<'PY'
          from pathlib import Path
          path = Path('frontend/src/components/ServerConnectionCenter.tsx')
          text = path.read_text()
          invalid = ': "\n") +'
          if invalid not in text:
              raise SystemExit('generated switch newline pattern not found')
          path.write_text(text.replace(invalid, ': "\\n") +', 1))
          PY
      - name: Publish apply diagnostics
        if: failure() && steps.apply.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '### Issue #343 apply diagnostics'
            echo '```text'
            if [ -s /tmp/codex343.log ]; then tail -80 /tmp/codex343.log; else echo 'payload extraction, compilation, or generated-source normalization failed'; fi
            echo '```'
          } > /tmp/codex343-comment.md
          gh pr comment 354 --body-file /tmp/codex343-comment.md
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run security and profile tests
        working-directory: frontend
        run: npm run test:run -- src/lib/__tests__/serverProfilesSecurity.test.ts src/lib/__tests__/profileCredentialVault.test.ts src/components/__tests__/ServerConnectionCenterSecurity.test.ts
      - name: Build frontend
        id: build
        working-directory: frontend
        shell: bash
        run: npm run build > /tmp/codex343-build.log 2>&1
      - name: Publish build diagnostics
        if: failure() && steps.build.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '### Issue #343 build diagnostics'
            echo '```text'
            tail -120 /tmp/codex343-build.log
            echo '```'
          } > /tmp/codex343-build-comment.md
          gh pr comment 354 --body-file /tmp/codex343-build-comment.md
      - name: Validate Electron bridge syntax
        run: |
          node --check electron/credentials.js
          node --check electron/preload.js
      - name: Commit verified implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/codex-issue-343-apply.yml .github/workflows/codex-issue-343-pr.yml
          git add electron frontend
          git commit -m "feat(auth): secure multi-server account profiles (#343)"
          git push origin HEAD:codex/issue-343-secure-account-profiles
