name: Apply PG Yjs version fix

on:
  issue_comment:
    types: [created]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.issue.number == 372 && github.event.issue.pull_request && github.event.comment.body == '/apply-pg-yjs-version-fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pg-migration-unified
          fetch-depth: 0
      - name: Patch server replacement version accounting
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/src/services/yjs.ts')
          source = path.read_text()

          noop_old = '''    if (current === markdown) {
              return null;
            }
          '''
          noop_new = '''    if (current === markdown) {
              // The caller has already persisted and versioned this canonical content.
              // Mark it accounted for even when the Y.Text replacement is a no-op.
              room.lastVersionBumpAt = Date.now();
              return null;
            }
          '''
          if noop_old in source:
              source = source.replace(noop_old, noop_new, 1)
          elif 'Mark it accounted for even when the Y.Text replacement is a no-op.' not in source:
              raise SystemExit('Yjs no-op branch anchor not found')

          update_old = '''    room.updatesSinceSnapshot++;
              if (userId) room.lastActorUserId = userId;

              // 到达阈值顺手合并一次 snapshot，行为与 yApplyUpdate 对齐
          '''
          update_new = '''    room.updatesSinceSnapshot++;
              if (userId) room.lastActorUserId = userId;
              // Prevent an immediate yFlush from counting the same server replacement again.
              room.lastVersionBumpAt = Date.now();

              // 到达阈值顺手合并一次 snapshot，行为与 yApplyUpdate 对齐
          '''
          if update_old in source:
              source = source.replace(update_old, update_new, 1)

          timer_old = '''      }, ROOM_IDLE_TIMEOUT_MS);
              }
            }
          '''
          timer_new = '''      }, ROOM_IDLE_TIMEOUT_MS);
                room.idleTimer.unref?.();
              }
            }
          '''
          if timer_old in source:
              source = source.replace(timer_old, timer_new, 1)

          path.write_text(source)
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/services/yjs.ts
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "fix(pg): account for no-op Yjs server replacement"
          git push origin HEAD:pg-migration-unified
