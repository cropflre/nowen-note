name: Note Split CI

on:
  push:
    branches: [main, pg-migration-unified]
    paths:
      - "backend/.yjs-noop-persist-fix-trigger"
      - "backend/src/services/yjs.ts"
      - "backend/src/index.hardened.ts"
      - "backend/src/lib/noteSplit.ts"
      - "backend/src/lib/tiptapNoteSplit.ts"
      - "backend/src/lib/noteBlockRedirects.ts"
      - "backend/src/runtime/note-split.ts"
      - "backend/src/runtime/note-split-selection.ts"
      - "backend/src/runtime/note-split-tiptap.ts"
      - "backend/src/runtime/block-link-redirect.ts"
      - "backend/src/runtime/task-stats-hardening.ts"
      - "backend/tests/setup-note-split-cleanup.ts"
      - "backend/tests/note-split.test.ts"
      - "backend/tests/note-split-title.test.ts"
      - "backend/tests/tiptap-note-split.test.ts"
      - "backend/tests/tiptap-note-split-empty.test.ts"
      - "backend/tests/block-link-redirect.test.ts"
      - "frontend/vite.config.ts"
      - "frontend/src/lib/noteSplit.ts"
      - "frontend/src/lib/tiptapNoteSplit.ts"
      - "frontend/src/lib/noteSplitApi.ts"
      - "frontend/src/lib/blockNavigation.ts"
      - "frontend/src/lib/__tests__/noteSplit.test.ts"
      - "frontend/src/lib/__tests__/tiptapNoteSplit.test.ts"
      - "frontend/src/lib/__tests__/blockNavigation.test.ts"
      - "frontend/src/components/NoteSplitDialog.tsx"
      - "frontend/src/components/EditorPaneRuntime.tsx"
      - "frontend/src/components/__tests__/NoteSplitDialog.test.tsx"
      - ".github/workflows/note-split-ci.yml"
  pull_request:
    paths:
      - "backend/src/services/yjs.ts"
      - "backend/src/index.hardened.ts"
      - "backend/src/lib/noteSplit.ts"
      - "backend/src/lib/tiptapNoteSplit.ts"
      - "backend/src/lib/noteBlockRedirects.ts"
      - "backend/src/runtime/note-split.ts"
      - "backend/src/runtime/note-split-selection.ts"
      - "backend/src/runtime/note-split-tiptap.ts"
      - "backend/src/runtime/block-link-redirect.ts"
      - "backend/src/runtime/task-stats-hardening.ts"
      - "backend/tests/setup-note-split-cleanup.ts"
      - "backend/tests/note-split.test.ts"
      - "backend/tests/note-split-title.test.ts"
      - "backend/tests/tiptap-note-split.test.ts"
      - "backend/tests/tiptap-note-split-empty.test.ts"
      - "backend/tests/block-link-redirect.test.ts"
      - "frontend/vite.config.ts"
      - "frontend/src/lib/noteSplit.ts"
      - "frontend/src/lib/tiptapNoteSplit.ts"
      - "frontend/src/lib/noteSplitApi.ts"
      - "frontend/src/lib/blockNavigation.ts"
      - "frontend/src/lib/__tests__/noteSplit.test.ts"
      - "frontend/src/lib/__tests__/tiptapNoteSplit.test.ts"
      - "frontend/src/lib/__tests__/blockNavigation.test.ts"
      - "frontend/src/components/NoteSplitDialog.tsx"
      - "frontend/src/components/EditorPaneRuntime.tsx"
      - "frontend/src/components/__tests__/NoteSplitDialog.test.tsx"
      - ".github/workflows/note-split-ci.yml"

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Split preview, selection, and redirect tests
        run: >-
          npm run test:run --
          src/lib/__tests__/noteSplit.test.ts
          src/lib/__tests__/tiptapNoteSplit.test.ts
          src/lib/__tests__/blockNavigation.test.ts
          src/components/__tests__/NoteSplitDialog.test.tsx
      - name: Frontend typecheck
        run: npx tsc -b

  backend-test:
    name: backend (${{ matrix.test_file }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        test_file:
          - note-split.test.ts
          - note-split-title.test.ts
          - tiptap-note-split.test.ts
          - tiptap-note-split-empty.test.ts
          - block-link-redirect.test.ts
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run isolated backend test
        shell: bash
        run: |
          set -o pipefail
          cleanup_args=()
          if [ "${{ matrix.test_file }}" = "note-split.test.ts" ]; then
            cleanup_args+=(--import ./tests/setup-note-split-cleanup.ts)
          fi
          node --import tsx \
            --import ./tests/setup-db-isolation.ts \
            "${cleanup_args[@]}" \
            --test "tests/${{ matrix.test_file }}" \
            2>&1 | tee "/tmp/${{ matrix.test_file }}.log"
      - name: Upload backend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: note-split-${{ matrix.test_file }}-${{ github.run_id }}
          path: /tmp/${{ matrix.test_file }}.log
          if-no-files-found: warn
          retention-days: 7

  backend-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build:tsc

  patch-yjs-noop-persist:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pg-migration-unified
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch Yjs source
        shell: bash
        run: |
          set -euo pipefail
          test -f backend/.yjs-noop-persist-fix-trigger
          python - <<'PY'
          from pathlib import Path
          import re

          yjs = Path("backend/src/services/yjs.ts")
          text = yjs.read_text()
          marker = "if (existing.content === markdown && existing.contentText === contentText) return;"
          if marker in text:
              raise SystemExit(0)
          pattern = re.compile(
              r'  const existing = db\.prepare\("SELECT version FROM notes WHERE id = \?"\)\.get\(room\.noteId\) as\n'
              r'\s+\| \{ version: number \}\n'
              r'\s+\| undefined;\n'
              r'  if \(!existing\) return;\n'
          )
          replacement = '''  const existing = db.prepare(
            "SELECT version, content, contentText FROM notes WHERE id = ?",
          ).get(room.noteId) as
            | { version: number; content: string; contentText: string }
            | undefined;
          if (!existing) return;
          // REST or transactional writers may already have persisted this exact Yjs state.
          // Flushing the same body must not create a phantom edit or bump note.version.
          if (existing.content === markdown && existing.contentText === contentText) return;
          '''
          updated, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit("target Yjs persistence block not found")
          yjs.write_text(updated)
          PY

          if git diff --quiet -- backend/src/services/yjs.ts; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/services/yjs.ts
          git commit -m "fix(yjs): skip no-op notes persistence"
          git push origin HEAD:pg-migration-unified
