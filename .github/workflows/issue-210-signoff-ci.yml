name: Issue 210 Performance Sign-off CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'test/210-performance-signoff'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Node sign-off tests
        run: npm run test:issue-210-signoff

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run collector tests
        working-directory: frontend
        run: npm run test:run -- src/lib/__tests__/issue210Signoff.test.ts

      - name: Type-check frontend
        working-directory: frontend
        run: npx tsc -b
