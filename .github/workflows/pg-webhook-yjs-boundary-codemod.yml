name: PostgreSQL Webhook Yjs Boundary Codemod

on:
  push:
    branches:
      - issue-248-direct-db-audit
    paths:
      - .github/workflows/pg-webhook-yjs-boundary-codemod.yml
      - backend/scripts/apply-webhook-yjs-boundary-codemod.mjs

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: issue-248-direct-db-audit
          fetch-depth: 0

      - name: Apply codemod
        run: node backend/scripts/apply-webhook-yjs-boundary-codemod.mjs

      - name: Commit generated boundary changes
        run: |
          if git diff --quiet; then
            echo "No codemod changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/services/webhook.ts backend/src/services/yjs.ts
          git commit -m "refactor(db): move webhook and Yjs persistence behind repositories (#248)"
          git push origin HEAD:issue-248-direct-db-audit
