name: Validate PG image hosting batch

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  validate:
    if: github.event.issue.number == 372 && github.event.issue.pull_request && github.event.comment.body == '/validate-pg-image-hosting-batch'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nowen
          POSTGRES_PASSWORD: nowen_ci_password
          POSTGRES_DB: nowen_note_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nowen -d nowen_note_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      TEST_PG_DATABASE_URL: postgres://nowen:nowen_ci_password@127.0.0.1:5432/nowen_note_test
      DATABASE_URL: postgres://nowen:nowen_ci_password@127.0.0.1:5432/nowen_note_test
      IMAGE_HOSTING_ENCRYPTION_KEY: pg-image-hosting-validation-key-2026
      GH_TOKEN: ${{ github.token }}
      STATUS_COMMENT_ID: "5042929483"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: pg-migration-unified
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: TypeScript, audits and dialect tests
        working-directory: backend
        run: |
          set -o pipefail
          {
            echo '=== TypeScript ==='
            npm run build:tsc -- --noEmit
            echo '=== SQLite boundary audit ==='
            npm run audit:sqlite-boundaries
            echo '=== PostgreSQL schema parity ==='
            npm run audit:pg-schema-parity
            echo '=== SQL dialect ==='
            node --import tsx --test --test-concurrency=1 tests/sql-dialect.test.ts
          } 2>&1 | tee /tmp/pg-image-hosting-validation.log

      - name: Full SQLite regression
        working-directory: backend
        env:
          DB_DRIVER: sqlite
          DATABASE_URL: ""
          TEST_PG_DATABASE_URL: ""
        run: |
          set -o pipefail
          npm run test:serial 2>&1 | tee -a /tmp/pg-image-hosting-validation.log

      - name: Real PostgreSQL regression
        working-directory: backend
        run: |
          set -o pipefail
          node --import tsx --test --test-concurrency=1 \
            tests/postgres-adapter.test.ts \
            tests/postgres-migrations.test.ts \
            tests/repository-batch-a-pg.test.ts \
            tests/repository-batch-b-pg.test.ts \
            tests/repository-permissions-pg.test.ts \
            tests/repository-access-session-pg.test.ts \
            tests/api-token-resources-pg.test.ts \
            tests/system-settings-repository-pg.test.ts \
            tests/image-hosting-settings-pg.test.ts \
            tests/custom-fonts-repository-pg.test.ts \
            tests/favorites-repository-pg.test.ts \
            tests/note-tags-repository-pg.test.ts 2>&1 | tee -a /tmp/pg-image-hosting-validation.log

      - name: Production bundle and migration packaging
        working-directory: backend
        run: |
          set -o pipefail
          npm run build 2>&1 | tee -a /tmp/pg-image-hosting-validation.log
          test -f dist/postgres/schema.sql
          test -f dist/postgres/schema.base.sql
          for migration in \
            0001_migration_state.sql \
            0002_api_tokens_parity.sql \
            0003_runtime_tables_parity.sql \
            0004_notebook_members_unique.sql \
            0005_api_token_resources.sql \
            0006_share_capabilities.sql \
            0007_note_import_origins.sql \
            0008_note_split_tables.sql; do
            test -f "dist/postgres/migrations/$migration"
          done

      - name: Publish success
        if: success()
        run: |
          sha=$(git rev-parse HEAD)
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${STATUS_COMMENT_ID}" -X PATCH -f body="## ✅ PostgreSQL image hosting batch validated

Head: \`${sha}\`
Run: \`${{ github.run_id }}\`

TypeScript, SQLite boundary audit, PostgreSQL schema parity, SQL dialect tests, full SQLite regression, real PostgreSQL regression including image hosting settings, production bundle, and migrations 0001–0008 packaging all passed."

      - name: Publish failure
        if: failure()
        run: |
          {
            echo '## ❌ PostgreSQL image hosting batch validation failed'
            echo
            echo "Run: \`${{ github.run_id }}\`"
            echo
            echo '```text'
            tail -n 360 /tmp/pg-image-hosting-validation.log 2>/dev/null || true
            echo '```'
          } > /tmp/status.md
          gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${STATUS_COMMENT_ID}" -X PATCH -f body="$(cat /tmp/status.md)"
