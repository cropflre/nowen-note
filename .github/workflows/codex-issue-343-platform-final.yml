name: Codex Issue 343 Platform Final

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false
          ref: codex/issue-343-secure-account-profiles
      - name: Apply platform and deletion guards
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          nav = Path('frontend/src/components/NavRail.tsx')
          text = nav.read_text()
          old = '''  const [activeServer, setActiveServer] = useState<ServerProfile | null>(() => (
            isDesktopApp() ? getActiveServerProfile() : null
          ));'''.replace('          isDesktopApp()', '    isDesktopApp()')
          # Keep the exact source indentation independent of this YAML block.
          old = '''  const [activeServer, setActiveServer] = useState<ServerProfile | null>(() => (
            isDesktopApp() ? getActiveServerProfile() : null
          ));'''.replace('            ', '    ')
          if old not in text:
              old = '''  const [activeServer, setActiveServer] = useState<ServerProfile | null>(() => (
    isDesktopApp() ? getActiveServerProfile() : null
  ));'''
          new = '''  const [activeServer, setActiveServer] = useState<ServerProfile | null>(() => getActiveServerProfile());'''
          if old not in text:
              raise SystemExit('NavRail active server initializer not found')
          text = text.replace(old, new, 1)
          old = '''  useEffect(() => {
    if (!isDesktopApp()) return;
    const refreshActiveServer = () => setActiveServer(getActiveServerProfile());
    refreshActiveServer();
    return subscribeServerProfiles(refreshActiveServer);
  }, []);'''
          new = '''  useEffect(() => {
    const refreshActiveServer = () => setActiveServer(getActiveServerProfile());
    refreshActiveServer();
    return subscribeServerProfiles(refreshActiveServer);
  }, []);'''
          if old not in text:
              raise SystemExit('NavRail profile subscription not found')
          text = text.replace(old, new, 1)
          old = '''      {isDesktopApp() && (
        <button
          type="button"
          onClick={() => window.dispatchEvent(new Event(SERVER_CONNECTION_CENTER_OPEN_EVENT))}
          title={showLabel ? undefined : "服务端与迁移中心"}
          aria-label="服务端与迁移中心"
          className={cn(
            itemBaseClass,
            "text-tx-tertiary hover:bg-app-hover hover:text-accent-primary",
          )}
        >
          <Server size={16} />
          <span
            className={cn(
              "absolute right-1 top-1 w-2 h-2 rounded-full ring-2 ring-app-sidebar",
              serverStatusDotClass(activeServer?.status),
            )}
            aria-hidden
          />
          {showLabel && (
            <span className="text-[10px] leading-none mt-0.5 max-w-full truncate px-1">服务端</span>
          )}
        </button>
      )}'''
          new = '''      <button
        type="button"
        onClick={() => window.dispatchEvent(new Event(SERVER_CONNECTION_CENTER_OPEN_EVENT))}
        title={showLabel ? undefined : "服务端与迁移中心"}
        aria-label="服务端与迁移中心"
        className={cn(
          itemBaseClass,
          "text-tx-tertiary hover:bg-app-hover hover:text-accent-primary",
        )}
      >
        <Server size={16} />
        <span
          className={cn(
            "absolute right-1 top-1 w-2 h-2 rounded-full ring-2 ring-app-sidebar",
            serverStatusDotClass(activeServer?.status),
          )}
          aria-hidden
        />
        {showLabel && (
          <span className="text-[10px] leading-none mt-0.5 max-w-full truncate px-1">服务端</span>
        )}
      </button>'''
          if old not in text:
              raise SystemExit('NavRail desktop-only server center entry not found')
          nav.write_text(text.replace(old, new, 1))

          profiles = Path('frontend/src/lib/serverProfiles.ts')
          text = profiles.read_text()
          old = '''export function removeServerProfile(id: string): ServerProfile[] {
  const profiles = writeProfiles(listServerProfiles().filter((profile) => profile.id !== id));'''
          new = '''export function removeServerProfile(id: string): ServerProfile[] {
  const activeId = localStorage.getItem(ACTIVE_KEY) || localStorage.getItem(LEGACY_ACTIVE_KEY) || "";
  if (id === activeId) return listServerProfiles();
  const profiles = writeProfiles(listServerProfiles().filter((profile) => profile.id !== id));'''
          if old not in text:
              raise SystemExit('removeServerProfile implementation not found')
          profiles.write_text(text.replace(old, new, 1))

          security = Path('frontend/src/lib/__tests__/serverProfilesSecurity.test.ts')
          text = security.read_text()
          text = text.replace(
            '  listServerProfiles,\n  upsertServerProfile,',
            '  listServerProfiles,\n  markServerProfileActive,\n  removeServerProfile,\n  upsertServerProfile,',
            1,
          )
          marker = '''  it("strips unknown sensitive fields on every write", () => {'''
          test = '''  it("refuses to remove the active profile at the storage boundary", () => {
    const active = upsertServerProfile({ id: "active", name: "Active", serverUrl: "http://active.test", username: "alice" });
    markServerProfileActive(active.id);
    removeServerProfile(active.id);
    expect(listServerProfiles().some((profile) => profile.id === active.id)).toBe(true);
  });

'''
          if marker not in text:
              raise SystemExit('serverProfilesSecurity test marker not found')
          security.write_text(text.replace(marker, test + marker, 1))

          center_test = Path('frontend/src/components/__tests__/ServerConnectionCenterSecurity.test.ts')
          text = center_test.read_text()
          marker = '''  it("preserves scoped offline queues and removes profile secrets on delete", () => {'''
          test = '''  it("exposes the server profile center from desktop, mobile, and web navigation", () => {
    const source = fs.readFileSync(path.resolve(process.cwd(), "src/components/NavRail.tsx"), "utf8");
    expect(source).toContain("window.dispatchEvent(new Event(SERVER_CONNECTION_CENTER_OPEN_EVENT))");
    expect(source).not.toContain("isDesktopApp() ? getActiveServerProfile() : null");
    expect(source).not.toContain("{isDesktopApp() && (\\n        <button\\n          type=\\\"button\\\"\\n          onClick={() => window.dispatchEvent(new Event(SERVER_CONNECTION_CENTER_OPEN_EVENT))}");
  });

'''
          if marker not in text:
              raise SystemExit('ServerConnectionCenterSecurity marker not found')
          center_test.write_text(text.replace(marker, test + marker, 1))
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run account profile regression tests
        working-directory: frontend
        run: npm run test:run -- src/lib/__tests__/serverProfiles.test.ts src/lib/__tests__/serverProfilesSecurity.test.ts src/lib/__tests__/profileCredentialVault.test.ts src/components/__tests__/ServerConnectionCenterSecurity.test.ts
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Validate Electron bridge syntax
        run: |
          node --check electron/credentials.js
          node --check electron/preload.js
      - name: Commit verified platform coverage
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/codex-issue-343-platform-final.yml
          git add frontend electron
          git commit -m "fix(auth): expose secure profiles across all clients (#343)"
          git push origin HEAD:codex/issue-343-secure-account-profiles
