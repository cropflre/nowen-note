name: Issue 355 Rework

on:
  push:
    branches:
      - fix/issue-355-content-projection
    paths:
      - ".github/workflows/issue-355-rework.yml"
      - ".github/scripts/issue355_rework.py"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/issue-355-rework.yml"
      - ".github/scripts/issue355_rework.py"

permissions:
  contents: write

jobs:
  rework:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply guarded source changes
        run: python .github/scripts/issue355_rework.py
      - name: Backend install
        working-directory: backend
        run: npm ci
      - name: Backend projection tests
        working-directory: backend
        run: node --import tsx --test tests/markdown-user-content.test.ts
      - name: Backend typecheck
        working-directory: backend
        run: npm run build:tsc
      - name: Frontend install
        working-directory: frontend
        run: npm ci
      - name: Frontend regression tests
        working-directory: frontend
        run: >-
          npm run test:run --
          src/lib/__tests__/markdownUserContent.test.ts
          src/components/__tests__/FormatAwareEditorPane.test.tsx
      - name: Frontend typecheck
        working-directory: frontend
        run: npx tsc -b
      - name: Commit verified implementation
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout "${{ github.head_ref }}"
          git add -A
          git commit -m "fix(api/editor): hide Markdown block IDs and route by content format (#355)"
          git push origin HEAD:"${{ github.head_ref }}"
