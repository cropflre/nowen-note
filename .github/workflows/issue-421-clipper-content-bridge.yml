name: Issue 421 Clipper Content Bridge

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/issue-421-clipper-content-bridge.yml"
      - "scripts/issue-421-clipper-content-bridge.mjs"
      - "packages/nowen-clipper/**"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/nowen-clipper/package-lock.json
      - name: Apply implementation patch
        run: node scripts/issue-421-clipper-content-bridge.mjs
      - name: Refresh clipper lockfile
        working-directory: packages/nowen-clipper
        run: npm install --package-lock-only --ignore-scripts
      - name: Install clipper dependencies
        working-directory: packages/nowen-clipper
        run: npm ci
      - name: Content bridge regression tests
        working-directory: packages/nowen-clipper
        run: npm test
      - name: Clipper TypeScript check
        id: clipper-tsc
        continue-on-error: true
        working-directory: packages/nowen-clipper
        run: npm run lint 2>&1 | tee clipper-tsc.log
      - uses: actions/upload-artifact@v4
        if: steps.clipper-tsc.outcome == 'failure'
        with:
          name: issue-421-clipper-tsc
          path: packages/nowen-clipper/clipper-tsc.log
      - name: Validate TypeScript check
        if: steps.clipper-tsc.outcome == 'failure'
        working-directory: packages/nowen-clipper
        run: |
          cat clipper-tsc.log
          exit 1
      - name: Build Chrome extension
        id: clipper-build
        continue-on-error: true
        working-directory: packages/nowen-clipper
        run: npm run build:chrome 2>&1 | tee clipper-build.log
      - uses: actions/upload-artifact@v4
        if: steps.clipper-build.outcome == 'failure'
        with:
          name: issue-421-clipper-build
          path: packages/nowen-clipper/clipper-build.log
      - name: Validate Chrome build
        if: steps.clipper-build.outcome == 'failure'
        working-directory: packages/nowen-clipper
        run: |
          cat clipper-build.log
          exit 1
      - name: Inspect generated extension entries
        working-directory: packages/nowen-clipper
        run: find dist -maxdepth 3 -type f -print | sort
      - name: Commit verified implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/nowen-clipper/package.json
          git add packages/nowen-clipper/package-lock.json
          git add packages/nowen-clipper/src/lib/protocol.ts
          git add packages/nowen-clipper/src/background/index.ts
          git add packages/nowen-clipper/src/background/enhanced.ts
          git add packages/nowen-clipper/src/content/index.ts
          git add packages/nowen-clipper/src/popup/popup.ts
          if ! git diff --cached --quiet; then
            git commit -m "fix(clipper): recover missing content script receivers"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
