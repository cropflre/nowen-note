name: PostgreSQL Unified TypeScript Diagnostics

on:
  push:
    branches:
      - pg-migration-unified
    paths:
      - ".github/workflows/pg-unified-tsc-diagnostics.yml"
      - "backend/src/**"
      - "backend/package.json"
      - "backend/package-lock.json"

permissions:
  contents: read

jobs:
  tsc:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Capture TypeScript output
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build:tsc -- --noEmit 2>&1 | tee /tmp/pg-unified-tsc.log
      - name: Upload TypeScript diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pg-unified-tsc-${{ github.run_id }}
          path: /tmp/pg-unified-tsc.log
          if-no-files-found: error
          retention-days: 2
