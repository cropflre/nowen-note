name: PostgreSQL Unified Merge Diagnostics

on:
  push:
    branches:
      - pg-migration-unified
    paths:
      - ".github/workflows/pg-unified-tsc-diagnostics.yml"
      - "backend/src/**"
      - "backend/tests/**"
      - "backend/package.json"
      - "backend/package-lock.json"
  pull_request:
    paths:
      - ".github/workflows/pg-unified-tsc-diagnostics.yml"
      - "backend/src/**"
      - "backend/tests/**"
      - "backend/package.json"
      - "backend/package-lock.json"

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Capture TypeScript output
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build:tsc -- --noEmit 2>&1 | tee /tmp/pg-unified-tsc.log
      - name: Capture notebook transfer regression
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node --import tsx --test tests/notebook-transfer-copy.test.ts 2>&1 | tee /tmp/notebook-transfer-copy.log
      - name: Capture SiYuan metadata regression
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node --import tsx --test tests/siyuan-import-metadata.test.ts 2>&1 | tee /tmp/siyuan-import-metadata.log
      - name: Upload merge diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pg-unified-diagnostics-${{ github.run_id }}
          path: |
            /tmp/pg-unified-tsc.log
            /tmp/notebook-transfer-copy.log
            /tmp/siyuan-import-metadata.log
          if-no-files-found: error
          retention-days: 2
