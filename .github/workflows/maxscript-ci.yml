name: MAXScript CI

on:
  pull_request:
    paths:
      - "frontend/src/lib/codeBlockLowlight.ts"
      - "frontend/src/lib/codeBlockLanguages/**"
      - "frontend/src/lib/__tests__/codeBlockLowlight.test.ts"
      - ".github/workflows/maxscript-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Registration and aliases
        run: npm run test:run -- src/lib/__tests__/codeBlockLowlight.test.ts -t "registers one canonical"
      - name: Explicit highlighting
        if: always()
        run: npm run test:run -- src/lib/__tests__/codeBlockLowlight.test.ts -t "highlights explicit"
      - name: Case-insensitive highlighting
        if: always()
        run: npm run test:run -- src/lib/__tests__/codeBlockLowlight.test.ts -t "case-insensitively"
      - name: Automatic detection exclusion
        if: always()
        run: npm run test:run -- src/lib/__tests__/codeBlockLowlight.test.ts -t "stays out of automatic"
      - name: Product labels
        if: always()
        run: npm run test:run -- src/lib/__tests__/codeBlockLowlight.test.ts -t "uses the product label"
