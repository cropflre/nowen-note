name: Apply PostgreSQL Unified Test Adjustments

on:
  push:
    branches:
      - pg-migration-unified
    paths:
      - .github/workflows/pg-unified-test-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pg-migration-unified
          fetch-depth: 0
          persist-credentials: true
      - name: Patch merge regression fixtures
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python3 <<'PY'
          from pathlib import Path

          transfer_path = Path("backend/tests/notebook-transfer-copy.test.ts")
          transfer = transfer_path.read_text(encoding="utf-8")
          old_workspace = '''  getDb().prepare("UPDATE notebooks SET workspaceId = ? WHERE id = ?").run(WS, "nb-root");'''
          new_workspace = '''  getDb().exec(`
    DELETE FROM notes WHERE notebookId IN ('nb-root', 'nb-child');
    DELETE FROM notebooks WHERE id = 'nb-child';
  `);
  getDb().prepare("UPDATE notebooks SET workspaceId = ? WHERE id = ?").run(WS, "nb-root");'''
          old_owner = '''  getDb().prepare("UPDATE notebooks SET userId = ? WHERE id = ?").run(OTHER, "nb-root");'''
          new_owner = '''  getDb().exec(`
    DELETE FROM notes WHERE notebookId IN ('nb-root', 'nb-child');
    DELETE FROM notebooks WHERE id = 'nb-child';
  `);
  getDb().prepare("UPDATE notebooks SET userId = ? WHERE id = ?").run(OTHER, "nb-root");'''
          if old_workspace not in transfer or old_owner not in transfer:
              raise SystemExit("notebook transfer fixture targets not found")
          transfer = transfer.replace(old_workspace, new_workspace, 1)
          transfer = transfer.replace(old_owner, new_owner, 1)
          transfer_path.write_text(transfer, encoding="utf-8")

          siyuan_path = Path("backend/tests/siyuan-import-metadata.test.ts")
          siyuan = siyuan_path.read_text(encoding="utf-8")
          marker = '''  assert.equal(result.success, true);'''
          replacement = '''  console.log("[siyuan-import-metadata] result", JSON.stringify(result));
  assert.equal(result.success, true);'''
          if marker not in siyuan:
              raise SystemExit("SiYuan result assertion target not found")
          siyuan = siyuan.replace(marker, replacement, 1)
          siyuan_path.write_text(siyuan, encoding="utf-8")
          PY
          git rm .github/workflows/pg-unified-test-patch.yml
          git add backend/tests/notebook-transfer-copy.test.ts backend/tests/siyuan-import-metadata.test.ts
          git commit -m "test(db): align unified migration regressions with latest main"
          git push origin HEAD:pg-migration-unified
