name: PR 226 Validation

on:
  pull_request:
    branches:
      - integration/pr-224-safe

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Existing package import tests
        run: node --import tsx --test tests/siyuan-package-import.test.ts
      - name: Existing Tiptap fidelity tests
        run: node --import tsx --test tests/siyuan-package-tiptap-fidelity.test.ts
      - name: Tag invariant tests
        run: node --import tsx --test tests/siyuan-package-tag-invariants.test.ts
      - name: Fidelity safety tests
        run: node --import tsx --test tests/siyuan-tiptap-fidelity-safety.test.ts

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Existing schema repair test
        run: npm run test:run -- src/lib/__tests__/tiptapSchemaRepair.test.ts
      - name: Table fidelity extension test
        run: npm run test:run -- src/lib/__tests__/tableFidelityExtensions.test.ts
      - name: TypeScript project build
        run: npx tsc -b
      - name: Vite production bundle
        run: npx vite build
