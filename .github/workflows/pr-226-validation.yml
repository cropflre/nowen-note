name: PR 226 Validation

on:
  pull_request:
    branches:
      - integration/pr-224-safe

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: SiYuan focused tests
        run: >-
          node --import tsx --test
          tests/siyuan-package-import.test.ts
          tests/siyuan-package-tiptap-fidelity.test.ts
          tests/siyuan-package-tag-invariants.test.ts
          tests/siyuan-tiptap-fidelity-safety.test.ts

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Focused Vitest
        run: >-
          npm run test:run --
          src/lib/__tests__/tiptapSchemaRepair.test.ts
          src/lib/__tests__/tableFidelityExtensions.test.ts
      - name: Production build
        run: npm run build
