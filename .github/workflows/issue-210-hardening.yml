name: Issue 210 Sign-off Hardening

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  harden-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'test/210-performance-signoff'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply hardening patch
        run: node scripts/apply-issue-210-signoff-hardening.mjs

      - name: Validate Node sign-off tests
        run: npm run test:issue-210-signoff

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run collector tests
        working-directory: frontend
        run: npm run test:run -- src/lib/__tests__/issue210Signoff.test.ts

      - name: Type-check frontend
        working-directory: frontend
        run: npx tsc -b

      - name: Commit hardening
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/lib/issue210Signoff.ts scripts/validate-issue-210-signoff.mjs scripts/tests/issue-210-signoff-validator.test.mjs
          if git diff --cached --quiet; then
            echo "Hardening already committed"
            exit 0
          fi
          git commit -m "test(perf): require complete issue 210 stability evidence"
          git push origin HEAD:${{ github.head_ref }}
