name: Yjs No-op Persist Fix Once

on:
  push:
    branches: [pg-migration-unified]
    paths:
      - "backend/.yjs-noop-persist-fix-trigger"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pg-migration-unified
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Prevent no-op Yjs flush version bumps
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/src/services/yjs.ts")
          text = path.read_text()
          old = '''  const existing = db.prepare("SELECT version FROM notes WHERE id = ?").get(room.noteId) as
            | { version: number }
            | undefined;
          if (!existing) return;
          '''
          new = '''  const existing = db.prepare(
            "SELECT version, content, contentText FROM notes WHERE id = ?",
          ).get(room.noteId) as
            | { version: number; content: string; contentText: string }
            | undefined;
          if (!existing) return;
          // A REST/transactional writer may already have persisted exactly this Yjs state.
          // Flushing the same body must not create a phantom edit or increment note.version.
          if (existing.content === markdown && existing.contentText === contentText) return;
          '''
          if old not in text:
              raise SystemExit("target Yjs persistence block not found")
          path.write_text(text.replace(old, new, 1))
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/services/yjs.ts
          git rm backend/.yjs-noop-persist-fix-trigger .github/workflows/yjs-noop-persist-fix-once.yml
          git commit -m "fix(yjs): skip no-op notes persistence"
          git push origin HEAD:pg-migration-unified
