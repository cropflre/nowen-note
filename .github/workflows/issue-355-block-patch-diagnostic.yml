name: Issue 355 Block Patch Gate Repair

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/scripts/issue355_block_patch_gate_fix.py"
      - ".github/workflows/issue-355-block-patch-diagnostic.yml"

permissions:
  contents: write

jobs:
  repair-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout PR source branch
        run: git checkout -B "${{ github.head_ref }}" "origin/${{ github.head_ref }}"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply guarded gate repairs
        run: python .github/scripts/issue355_block_patch_gate_fix.py
      - name: Backend install
        working-directory: backend
        run: npm ci
      - name: Backend Block Patch suite
        working-directory: backend
        run: >-
          node --import tsx --test
          tests/tiptap-block-patch.test.ts
          tests/tiptap-block-patch-v2.test.ts
          tests/tiptap-block-patch-image.test.ts
          tests/tiptap-list-item-move.test.ts
          tests/tiptap-list-item-structure.test.ts
          tests/block-patch-route.test.ts
          tests/block-patch-route-v2.test.ts
          tests/block-patch-route-image.test.ts
          tests/block-patch-list-route.test.ts
          tests/block-patch-list-structure-route.test.ts
          tests/block-patch-incremental-index.test.ts
          tests/block-patch-mixed-index.test.ts
      - name: Backend typecheck
        working-directory: backend
        run: npm run build:tsc
      - name: Frontend install
        working-directory: frontend
        run: npm ci
      - name: Frontend Block Patch suite
        id: frontend-suite
        working-directory: frontend
        shell: bash
        run: |
          set +e
          npm run test:run -- \
            src/lib/__tests__/blockPatchApi.test.ts \
            src/lib/__tests__/blockPatchListStructureApi.test.ts \
            src/lib/__tests__/tiptapBlockPatchPlanner.test.ts \
            src/lib/__tests__/tiptapBlockPatchPlannerV2.test.ts \
            src/lib/__tests__/tiptapSchemaRepair.test.ts \
            src/lib/__tests__/tiptapBlockPatchImagePlanner.test.ts \
            src/lib/__tests__/tiptapBlockPatchEmptyDocument.test.ts \
            src/lib/__tests__/tiptapBlockPatchRuntime.test.ts \
            src/lib/__tests__/tiptapListItemMovePlanner.test.ts \
            src/lib/__tests__/tiptapListItemStructurePlanner.test.ts \
            src/lib/__tests__/tiptapListItemBatchPlanner.test.ts \
            src/lib/__tests__/tiptapListItemLiftPlanner.test.ts \
            src/lib/__tests__/tiptapEmptyBlockIdentityDispatch.test.ts \
            src/components/__tests__/TiptapBlockPatchRuntime.test.tsx \
            src/components/__tests__/TiptapBlockPatchRuntimeV2.test.tsx \
            src/components/__tests__/TiptapBlockPatchImageRuntime.test.tsx \
            src/components/__tests__/TiptapBlockPatchEmptyDocument.test.tsx \
            src/components/__tests__/TiptapBlockPatchListRuntime.test.tsx \
            src/components/__tests__/TiptapBlockPatchListStructureRuntime.test.tsx \
            src/components/__tests__/TiptapRuntimePublicContext.test.tsx > /tmp/issue-355-gate-frontend.log 2>&1
          status=$?
          tail -n 200 /tmp/issue-355-gate-frontend.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
      - name: Upload frontend gate diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-355-gate-frontend
          path: /tmp/issue-355-gate-frontend.log
      - name: Require frontend suite success
        if: steps.frontend-suite.outputs.status != '0'
        run: exit 1
      - name: Frontend typecheck
        working-directory: frontend
        run: npx tsc -b
      - name: Commit verified gate repairs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/tests frontend/src/components/__tests__
          git commit -m "test(block-patch): align gate with current protocols (#355)"
          git push origin HEAD:"${{ github.head_ref }}"
