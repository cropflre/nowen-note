name: PostgreSQL Main Sync Once

on:
  push:
    branches: [pg-migration-unified]
    paths:
      - ".github/workflows/pg-sync-main-once.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pg-migration-unified
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge latest main with controlled conflict resolution
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main pg-migration-unified

          set +e
          git merge --no-ff --no-commit origin/main
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
            printf 'Conflicts:\n%s\n' "${conflicts[*]}"
            allowed=(
              ".github/workflows/block-patch-ci.yml"
              "backend/src/repositories/index.ts"
              "backend/src/services/yjs.ts"
            )
            for file in "${conflicts[@]}"; do
              matched=false
              for expected in "${allowed[@]}"; do
                if [ "$file" = "$expected" ]; then matched=true; break; fi
              done
              if [ "$matched" != true ]; then
                echo "Unexpected conflict: $file" >&2
                exit 1
              fi
            done

            git checkout --theirs .github/workflows/block-patch-ci.yml
            git checkout --ours backend/src/repositories/index.ts
            git checkout --ours backend/src/services/yjs.ts
          fi

          python - <<'PY'
          from pathlib import Path

          repo_index = Path("backend/src/repositories/index.ts")
          text = repo_index.read_text()
          block_export = '''export {
            blockAuthorityRepository,
            createBlockAuthorityRepository,
          } from "./blockAuthorityRepository";
          '''
          if 'from "./blockAuthorityRepository"' not in text:
              marker = 'export { roundTripPermissionMappingRepository } from "./roundTripPermissionMappingRepository";\n'
              if marker not in text:
                  marker = 'export { embeddingQueueRepository } from "./embeddingQueueRepository";\n'
              text = text.replace(marker, marker + block_export)
          repo_index.write_text(text)

          yjs_repo = Path("backend/src/repositories/yjsPersistenceRepository.ts")
          text = yjs_repo.read_text()
          if "getNoteContentFormat(" not in text:
              insertion = '''

            getDatabase() {
              return getDb();
            },

            getNoteContentFormat(noteId: string): string | null {
              const row = getDb()
                .prepare("SELECT contentFormat FROM notes WHERE id = ?")
                .get(noteId) as { contentFormat: string } | undefined;
              return row?.contentFormat ?? null;
            },

            getNoteContentRecord(noteId: string): { content: string; contentFormat: string } | undefined {
              return getDb()
                .prepare("SELECT content, contentFormat FROM notes WHERE id = ?")
                .get(noteId) as { content: string; contentFormat: string } | undefined;
            },

            retireLegacyHistory(noteId: string): void {
              const db = getDb();
              db.transaction(() => {
                noteYupdatesRepository.deleteByNoteId(noteId);
                noteYsnapshotsRepository.deleteByNoteId(noteId);
              })();
            },
          '''
              pos = text.rfind('\n};')
              if pos < 0:
                  raise SystemExit("yjsPersistenceRepository closing marker not found")
              text = text[:pos] + insertion + text[pos:]
          yjs_repo.write_text(text)

          yjs = Path("backend/src/services/yjs.ts")
          text = yjs.read_text()
          subdoc_import = '''import {
            assertYjsSubdocumentGeneration,
            getYjsSubdocumentSnapshot,
            applyYjsSubdocumentUpdate,
            isYjsSubdocumentsEnabled,
            prepareYjsSubdocuments,
          } from "./yjs-subdocuments.js";
          '''
          if 'from "./yjs-subdocuments.js"' not in text:
              marker = '} from "../repositories";\n'
              text = text.replace(marker, marker + subdoc_import, 1)

          old_join = '''export function yJoin(noteId: string, userId: string | null): YJoinResult {
            const room = getOrCreateRoom(noteId);
          '''
          new_join = '''export function yJoin(noteId: string, userId: string | null): YJoinResult {
            if (
              isYjsSubdocumentsEnabled()
              && yjsPersistenceRepository.getNoteContentFormat(noteId) === "tiptap-json"
            ) {
              throw new Error("YJS_SUBDOCUMENT_PROTOCOL_REQUIRED");
            }
            const room = getOrCreateRoom(noteId);
          '''
          if "YJS_SUBDOCUMENT_PROTOCOL_REQUIRED" not in text:
              if old_join not in text:
                  raise SystemExit("yJoin marker not found")
              text = text.replace(old_join, new_join, 1)

          functions = '''/** 实验协议：为超大富文本建立章节清单，并按需返回单个 Subdocument 快照。 */
          export function yPrepareSubdocuments(noteId: string): {
            rootGuid: string;
            generation: number;
            structureVersion: number;
            sections: Array<{ id: string; guid: string; startBlock: number; endBlock: number }>;
          } | null {
            if (!isYjsSubdocumentsEnabled()) return null;
            const note = yjsPersistenceRepository.getNoteContentRecord(noteId);
            if (!note || note.contentFormat !== "tiptap-json") return null;
            return prepareYjsSubdocuments(yjsPersistenceRepository.getDatabase(), noteId, note.content);
          }

          export function yGetSubdocumentState(
            noteId: string,
            sectionId: string,
          ): { guid: string; stateBase64: string } | null {
            if (!isYjsSubdocumentsEnabled()) return null;
            const snapshot = getYjsSubdocumentSnapshot(
              yjsPersistenceRepository.getDatabase(),
              noteId,
              sectionId,
            );
            return snapshot ? { guid: snapshot.guid, stateBase64: bufferToBase64(snapshot.snapshot) } : null;
          }

          export function yApplySubdocumentUpdate(
            noteId: string,
            sectionId: string,
            updateBase64: string,
            userId: string | null,
            expectedGeneration: number,
          ): {
            content: string;
            contentText: string;
            sectionGuid: string;
            version: number;
            generation: number;
            structureVersion: number;
          } | null {
            if (!isYjsSubdocumentsEnabled()) return null;
            const db = yjsPersistenceRepository.getDatabase();
            assertYjsSubdocumentGeneration(db, noteId, expectedGeneration);
            if (rooms.has(noteId)) throw new Error("SUBDOCUMENT_LEGACY_ROOM_ACTIVE");
            const update = base64ToUint8(updateBase64);
            const result = applyYjsSubdocumentUpdate(
              db,
              noteId,
              sectionId,
              update,
              userId,
              expectedGeneration,
            );
            try {
              yjsPersistenceRepository.retireLegacyHistory(noteId);
            } catch (error) {
              console.warn(`[yjs] retire legacy history failed for ${noteId}:`, error);
            }
            return result;
          }

          '''
          if "export function yPrepareSubdocuments" not in text:
              marker = '/**\n           * 强制把 yText "content" 替换为给定 markdown'
              if marker not in text:
                  raise SystemExit("subdocument insertion marker not found")
              text = text.replace(marker, functions + marker, 1)
          yjs.write_text(text)
          PY

          git add .github/workflows/block-patch-ci.yml \
            backend/src/repositories/index.ts \
            backend/src/repositories/yjsPersistenceRepository.ts \
            backend/src/services/yjs.ts

          unresolved=$(git diff --name-only --diff-filter=U)
          if [ -n "$unresolved" ]; then
            echo "Unresolved conflicts remain:" >&2
            echo "$unresolved" >&2
            exit 1
          fi

          git rm .github/workflows/pg-sync-main-once.yml
          git commit -m "chore(db): merge latest main into pg migration"
          git push origin HEAD:pg-migration-unified
