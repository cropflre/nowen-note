name: Apply Issue 302

on:
  push:
    branches: [main]
    paths:
      - .github/issue-302-trigger

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Apply implementation and run regression checks
        shell: bash
        run: |
          set +e
          python3 .github/scripts/apply-issue-302.py > /tmp/issue-302.log 2>&1
          PATCH=$?

          BACKEND_INSTALL=99
          BACKEND_TYPECHECK=99
          BACKEND_TEST=99
          BACKEND_BUILD=99
          FRONTEND_INSTALL=99
          FRONTEND_TEST=99
          FRONTEND_TYPECHECK=99

          if [ "$PATCH" -eq 0 ]; then
            cd backend
            npm ci >> /tmp/issue-302.log 2>&1
            BACKEND_INSTALL=$?
            if [ "$BACKEND_INSTALL" -eq 0 ]; then
              npm run build:tsc >> /tmp/issue-302.log 2>&1
              BACKEND_TYPECHECK=$?
              node --import tsx --test tests/remote-image-import-security.test.ts >> /tmp/issue-302.log 2>&1
              BACKEND_TEST=$?
              npm run build >> /tmp/issue-302.log 2>&1
              BACKEND_BUILD=$?
            fi
            cd ../frontend
            npm ci >> /tmp/issue-302.log 2>&1
            FRONTEND_INSTALL=$?
            if [ "$FRONTEND_INSTALL" -eq 0 ]; then
              npm run test:run -- src/lib/__tests__/pasteForegroundColor.test.ts >> /tmp/issue-302.log 2>&1
              FRONTEND_TEST=$?
              npx tsc -b >> /tmp/issue-302.log 2>&1
              FRONTEND_TYPECHECK=$?
            fi
            cd ..
          fi

          export PATCH BACKEND_INSTALL BACKEND_TYPECHECK BACKEND_TEST BACKEND_BUILD FRONTEND_INSTALL FRONTEND_TEST FRONTEND_TYPECHECK
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          keys = [
              "PATCH", "BACKEND_INSTALL", "BACKEND_TYPECHECK", "BACKEND_TEST", "BACKEND_BUILD",
              "FRONTEND_INSTALL", "FRONTEND_TEST", "FRONTEND_TYPECHECK",
          ]
          statuses = {key.lower(): int(os.environ[key]) for key in keys}
          log = Path('/tmp/issue-302.log').read_text(encoding='utf-8', errors='replace') if Path('/tmp/issue-302.log').exists() else ''
          Path('.github/issue-302-diagnostics.json').write_text(
              json.dumps({
                  "ok": all(value == 0 for value in statuses.values()),
                  "statuses": statuses,
                  "log": "\n".join(log.splitlines()[-500:]),
              }, ensure_ascii=False, indent=2) + "\n",
              encoding='utf-8',
          )
          PY

          OK=0
          if [ "$PATCH" -eq 0 ] \
            && [ "$BACKEND_INSTALL" -eq 0 ] \
            && [ "$BACKEND_TYPECHECK" -eq 0 ] \
            && [ "$BACKEND_TEST" -eq 0 ] \
            && [ "$BACKEND_BUILD" -eq 0 ] \
            && [ "$FRONTEND_INSTALL" -eq 0 ] \
            && [ "$FRONTEND_TEST" -eq 0 ] \
            && [ "$FRONTEND_TYPECHECK" -eq 0 ]; then
            OK=1
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm -f .github/issue-302-trigger
          rm -f .github/workflows/apply-issue-302.yml

          if [ "$OK" -eq 1 ]; then
            rm -f .github/scripts/apply-issue-302.py
            rm -f .github/issue-302-diagnostics.json
            git add -A
            git commit -m "feat(editor): localize remote images and warn on risky paste colors (#302)" -m "Fixes #302"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            git add -A
            git commit -m "test(editor): record issue 302 implementation diagnostics"
            git pull --rebase origin main
            git push origin HEAD:main
            exit 1
          fi
