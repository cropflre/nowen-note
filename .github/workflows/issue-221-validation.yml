name: Issue 221 Validation

on:
  pull_request:
    branches:
      - implementation/issue-221-image-export

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install proposed dependencies
        working-directory: frontend
        run: npm ci
      - name: Image export regressions
        working-directory: frontend
        run: npm run test:run -- src/lib/__tests__/noteImageExportCore.test.ts
      - name: Typecheck proposed code
        shell: bash
        run: |
          cd frontend
          set +e
          npx tsc -b --pretty false > "$GITHUB_WORKSPACE/head-tsc.log" 2>&1
          echo $? > "$GITHUB_WORKSPACE/head-tsc.status"
          set -e
      - name: Typecheck current main
        shell: bash
        run: |
          git fetch origin main
          git worktree add ../main-worktree origin/main
          cd ../main-worktree/frontend
          npm ci
          set +e
          npx tsc -b --pretty false > "$GITHUB_WORKSPACE/main-tsc.log" 2>&1
          echo $? > "$GITHUB_WORKSPACE/main-tsc.status"
          set -e
      - name: Assert no new TypeScript diagnostics
        shell: bash
        run: |
          grep 'error TS' head-tsc.log | sort > head-errors.txt || true
          grep 'error TS' main-tsc.log | sort > main-errors.txt || true
          diff -u main-errors.txt head-errors.txt
      - name: Production bundle
        working-directory: frontend
        run: npx vite build

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Compile Android Java
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew compileDebugJavaWithJavac --no-daemon
