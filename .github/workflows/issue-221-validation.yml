name: Issue 221 Validation

on:
  pull_request:
    branches:
      - implementation/issue-221-image-export

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Image export regressions
        run: npm run test:run -- src/lib/__tests__/noteImageExportCore.test.ts
      - name: TypeScript check
        run: npx tsc -b --pretty false
      - name: Production bundle
        run: npx vite build

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Sync Capacitor Android project
        working-directory: frontend
        run: npx cap sync android
      - name: Compile Android Java
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew compileDebugJavaWithJavac --no-daemon
