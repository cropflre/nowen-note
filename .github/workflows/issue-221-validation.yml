name: Issue 221 Validation

on:
  pull_request:
    branches:
      - implementation/issue-221-image-export

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install proposed dependencies
        working-directory: frontend
        run: npm ci
      - name: Image export regressions
        working-directory: frontend
        run: npm run test:run -- src/lib/__tests__/noteImageExportCore.test.ts
      - name: Typecheck proposed code
        shell: bash
        run: |
          cd frontend
          set +e
          npx tsc -b --pretty false > "$GITHUB_WORKSPACE/head-tsc.log" 2>&1
          echo $? > "$GITHUB_WORKSPACE/head-tsc.status"
          set -e
      - name: Typecheck current main
        shell: bash
        run: |
          git fetch origin main
          git worktree add ../main-worktree origin/main
          cd ../main-worktree/frontend
          npm ci
          set +e
          npx tsc -b --pretty false > "$GITHUB_WORKSPACE/main-tsc.log" 2>&1
          echo $? > "$GITHUB_WORKSPACE/main-tsc.status"
          set -e
      - name: Assert no new TypeScript diagnostics
        shell: bash
        run: |
          grep 'error TS' head-tsc.log | sort > head-errors.txt || true
          grep 'error TS' main-tsc.log | sort > main-errors.txt || true
          diff -u main-errors.txt head-errors.txt
      - name: Production bundle
        working-directory: frontend
        run: npx vite build

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root Capacitor CLI
        run: npm ci
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend assets
        working-directory: frontend
        run: npx vite build
      - name: Capture Capacitor Android sync
        working-directory: frontend
        shell: bash
        run: |
          set +e
          npx cap sync android 2>&1 | tee "$GITHUB_WORKSPACE/issue-221-cap-sync.log"
          echo "${PIPESTATUS[0]}" > "$GITHUB_WORKSPACE/issue-221-cap-sync.status"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue-221-capacitor-sync
          path: |
            issue-221-cap-sync.log
            issue-221-cap-sync.status
      - name: Enforce Capacitor sync
        run: test "$(cat issue-221-cap-sync.status)" = "0"
      - name: Capture Android Java compilation
        working-directory: frontend/android
        shell: bash
        run: |
          chmod +x gradlew
          set +e
          ./gradlew compileDebugJavaWithJavac --no-daemon 2>&1 | tee "$GITHUB_WORKSPACE/issue-221-android.log"
          echo "${PIPESTATUS[0]}" > "$GITHUB_WORKSPACE/issue-221-android.status"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue-221-android-compile
          path: |
            issue-221-android.log
            issue-221-android.status
      - name: Enforce Android Java compilation
        run: test "$(cat issue-221-android.status)" = "0"
