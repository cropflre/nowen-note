name: Issue 216 Validation

on:
  pull_request:
    branches:
      - integration/issue-216-main-ready

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Shared attachment and media regressions
        run: >-
          node --import tsx --test
          tests/attachment-shared-access.test.ts
          tests/attachments-inline-video.test.ts

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Attachment bridge Vitest
        run: npm run test:run -- src/lib/__tests__/noteAttachmentAccessBridge.test.ts
      - name: Vite production bundle
        run: npx vite build

  frontend-typecheck-delta:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Typecheck proposed code
        shell: bash
        run: |
          cd frontend
          npm ci
          set +e
          npx tsc -b --pretty false > "$GITHUB_WORKSPACE/head-tsc.log" 2>&1
          echo $? > "$GITHUB_WORKSPACE/head-tsc.status"
          set -e
      - name: Typecheck current main
        shell: bash
        run: |
          git fetch origin main
          git worktree add ../main-worktree origin/main
          cd ../main-worktree/frontend
          npm ci
          set +e
          npx tsc -b --pretty false > "$GITHUB_WORKSPACE/main-tsc.log" 2>&1
          echo $? > "$GITHUB_WORKSPACE/main-tsc.status"
          set -e
      - name: Assert no new TypeScript diagnostics
        shell: bash
        run: |
          grep 'error TS' head-tsc.log | sort > head-errors.txt || true
          grep 'error TS' main-tsc.log | sort > main-errors.txt || true
          diff -u main-errors.txt head-errors.txt
