name: Issue 207 Validation

on:
  pull_request:
    branches:
      - integration/issue-207-main-ready

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Capture TypeScript check
        shell: bash
        run: |
          set +e
          npx tsc --noEmit --pretty false > "$GITHUB_WORKSPACE/backend-tsc.log" 2>&1
          echo $? > "$GITHUB_WORKSPACE/backend-tsc.status"
          set -e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue-207-backend-tsc
          path: backend-tsc.log
      - name: Enforce TypeScript check
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          cat backend-tsc.log
          exit "$(cat backend-tsc.status)"
      - name: Safe migration regressions
        run: node --import tsx --test tests/user-migration-v2.test.ts

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Server profile regressions
        run: npm run test:run -- src/lib/__tests__/serverProfiles.test.ts
      - name: Vite production bundle
        run: npx vite build

  frontend-typecheck-delta:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Typecheck proposed code
        shell: bash
        run: |
          cd frontend
          npm ci
          set +e
          npx tsc -b --pretty false > "$GITHUB_WORKSPACE/head-tsc.log" 2>&1
          echo $? > "$GITHUB_WORKSPACE/head-tsc.status"
          set -e
      - name: Typecheck current main
        shell: bash
        run: |
          git fetch origin main
          git worktree add ../main-worktree origin/main
          cd ../main-worktree/frontend
          npm ci
          set +e
          npx tsc -b --pretty false > "$GITHUB_WORKSPACE/main-tsc.log" 2>&1
          echo $? > "$GITHUB_WORKSPACE/main-tsc.status"
          set -e
      - name: Assert no new TypeScript diagnostics
        shell: bash
        run: |
          grep 'error TS' head-tsc.log | sort > head-errors.txt || true
          grep 'error TS' main-tsc.log | sort > main-errors.txt || true
          diff -u main-errors.txt head-errors.txt
