name: Codex Issue 351 Editor Final

on:
  push:
    branches:
      - codex/issue-351-note-loading-ux

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Patch EditorPane and clean temporary files
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("frontend/src/components/EditorPane.tsx")
          text = path.read_text(encoding="utf-8-sig")

          def sub(pattern: str, replacement: str, label: str, flags=0):
              global text
              text, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise RuntimeError(f"{label}: expected 1 replacement, got {count}")

          sub(
              r'import \{ motion, AnimatePresence \} from "framer-motion";',
              'import { motion, AnimatePresence, useReducedMotion } from "framer-motion";',
              "framer reduced motion import",
          )
          sub(
              r'(const \{ activeNote, syncStatus, lastSyncedAt, noteLoading, noteLoadingState \} = state;)',
              r'\1\n  const reduceMotion = useReducedMotion();',
              "reduced motion hook",
          )
          sub(
              r'const isTrashed = !!activeNote\?\.isTrashed;\n  const effectiveLocked = !!activeNote\?\.isLocked \|\| isViewLocked \|\| isTrashed;',
              'const isTrashed = !!activeNote?.isTrashed;\n  const noteSwitchPending = !!noteLoadingState.pendingNoteId;\n  const effectiveLocked = !!activeNote?.isLocked || isViewLocked || isTrashed || noteSwitchPending;',
              "pending read-only guard",
          )

          # Adjacent tab after trash uses the shared delayed loader.
          sub(
              r'''    if \(nextTab\) \{\n      actions\.setNoteLoading\(true\);\n      api\.getNote\(nextTab\.id\)[\s\S]*?\n        \.finally\(\(\) => actions\.setNoteLoading\(false\)\);\n    \}''',
              '''    if (nextTab) {\n      void loadNote({\n        noteId: nextTab.id,\n        summary: {\n          title: nextTab.title || t("editorTabs.noTitle"),\n          notebookId: nextTab.notebookId,\n          contentFormat: nextTab.contentFormat,\n        },\n        request: () => api.getNote(nextTab.id),\n        onSuccess: (nextNote) => {\n          actions.setActiveNote(nextNote);\n          actions.openNoteTab({\n            id: nextNote.id,\n            title: nextNote.title,\n            notebookId: nextNote.notebookId,\n            workspaceId: nextNote.workspaceId,\n            contentFormat: nextNote.contentFormat,\n            isLocked: nextNote.isLocked,\n            isTrashed: nextNote.isTrashed,\n            updatedAt: nextNote.updatedAt,\n          });\n        },\n      });\n    }''',
              "trash adjacent tab loader",
              re.S,
          )
          sub(
              r'\}, \[activeNote, actions, state\.openNoteTabs, userPrefs\.enableNoteTabs\]\);',
              '}, [activeNote, actions, loadNote, state.openNoteTabs, t, userPrefs.enableNoteTabs]);',
              "trash callback dependencies",
          )

          # Block-reference callback uses the same latest-request-wins path.
          sub(
              r'''  const handleOpenNote = useCallback\(async \(noteId: string\) => \{[\s\S]*?\n  \}, \[actions, t\]\);''',
              '''  const handleOpenNote = useCallback(async (noteId: string) => {\n    await loadNote({\n      noteId,\n      summary: { title: t("editor.noteLoading"), notebookId: "" },\n      request: () => api.getNote(noteId),\n      onSuccess: (note) => actions.setActiveNote(note),\n    });\n  }, [actions, loadNote, t]);''',
              "block reference loader",
              re.S,
          )

          # Mobile back remains usable for initial page skeleton and overlay error/loading states.
          sub(
              r'(state=\{noteLoadingState\}\n        onRetry=\{\(\) => \{ void retryNoteLoad\(\); \}\})',
              r'\1\n        onBack={() => actions.setMobileView("list")}',
              "page skeleton back",
          )
          sub(
              r'(state=\{noteLoadingState\}\n              onRetry=\{\(\) => \{ void retryNoteLoad\(\); \}\})',
              r'\1\n              onBack={() => actions.setMobileView("list")}',
              "overlay skeleton back",
          )
          sub(
              r'transition=\{\{ duration: 0\.15 \}\}',
              'transition={{ duration: reduceMotion ? 0 : 0.15 }}',
              "content reduced motion",
          )
          sub(
              r'transition=\{\{ duration: 0\.14, ease: "easeOut" \}\}',
              'transition={{ duration: reduceMotion ? 0 : 0.14, ease: "easeOut" }}',
              "overlay reduced motion",
          )

          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/codex-issue-351-finalize.yml").unlink(missing_ok=True)
          Path(".github/workflows/codex-issue-351-editor-final.yml").unlink(missing_ok=True)
          Path(".issue351-diagnostics.txt").unlink(missing_ok=True)
          Path(".issue351-verification.txt").unlink(missing_ok=True)
          PY
          git diff --check

      - name: Verify frontend
        shell: bash
        run: |
          set +e
          report=.issue351-verification.txt
          : > "$report"
          cd frontend
          npm ci >> ../$report 2>&1
          install_code=$?
          echo "install_exit=$install_code" >> ../$report
          test_code=99
          build_code=99
          if [ "$install_code" -eq 0 ]; then
            npm run test:run -- src/lib/__tests__/noteLoadCoordinator.test.ts >> ../$report 2>&1
            test_code=$?
            echo "test_exit=$test_code" >> ../$report
            npm run build >> ../$report 2>&1
            build_code=$?
            echo "build_exit=$build_code" >> ../$report
          fi
          cd ..
          echo "summary install=$install_code test=$test_code build=$build_code" >> "$report"

      - name: Commit final state and verification
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(editor): complete delayed note loading UX (#351)"
          git push origin HEAD:codex/issue-351-note-loading-ux
