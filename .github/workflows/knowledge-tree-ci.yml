name: Knowledge Tree CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/issue-370-p0c-p1-knowledge-tree
    paths:
      - "backend/src/db/knowledgeTree*.ts"
      - "backend/src/db/postgres/060_knowledge_tree.sql"
      - "backend/src/db/postgres/063_knowledge_tree_legacy_sync.sql"
      - "backend/src/db/postgres/064_knowledge_tree_structural_guard.sql"
      - "backend/src/runtime/knowledge-tree*.ts"
      - "backend/src/routes/knowledge-tree.ts"
      - "backend/src/services/knowledge*.ts"
      - "backend/src/services/notebook-permissions.ts"
      - "backend/src/middleware/knowledgeCapabilityGuard.ts"
      - "backend/src/index.hardened.ts"
      - "backend/tests/knowledge-tree*.test.ts"
      - "frontend/src/components/KnowledgeTreeDrawer.tsx"
      - "frontend/src/components/MobileDrawerUxBridge.tsx"
      - "frontend/src/lib/knowledgeTree*.ts"
      - "frontend/src/lib/__tests__/knowledgeTree*.test.ts"
      - ".github/workflows/knowledge-tree-ci.yml"
  pull_request:
    paths:
      - "backend/src/db/knowledgeTree*.ts"
      - "backend/src/db/postgres/060_knowledge_tree.sql"
      - "backend/src/db/postgres/063_knowledge_tree_legacy_sync.sql"
      - "backend/src/db/postgres/064_knowledge_tree_structural_guard.sql"
      - "backend/src/runtime/knowledge-tree*.ts"
      - "backend/src/routes/knowledge-tree.ts"
      - "backend/src/services/knowledge*.ts"
      - "backend/src/services/notebook-permissions.ts"
      - "backend/src/middleware/knowledgeCapabilityGuard.ts"
      - "backend/src/index.hardened.ts"
      - "backend/tests/knowledge-tree*.test.ts"
      - "frontend/src/components/KnowledgeTreeDrawer.tsx"
      - "frontend/src/components/MobileDrawerUxBridge.tsx"
      - "frontend/src/lib/knowledgeTree*.ts"
      - "frontend/src/lib/__tests__/knowledgeTree*.test.ts"
      - ".github/workflows/knowledge-tree-ci.yml"

permissions:
  contents: read
  issues: write

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Prepare diagnostic logs
        run: mkdir -p .ci
      - id: sqlite
        name: Knowledge tree SQLite tests
        continue-on-error: true
        run: |
          set -o pipefail
          node --import tsx --import ./tests/setup-db-isolation.ts --test tests/knowledge-tree.test.ts 2>&1 | tee .ci/sqlite.log
      - id: postgres
        name: PostgreSQL schema parity test
        if: always()
        continue-on-error: true
        run: |
          set -o pipefail
          node --import tsx --test tests/knowledge-tree-postgres-schema.test.ts 2>&1 | tee .ci/postgres.log
      - id: backend_typecheck
        name: Backend typecheck
        if: always()
        continue-on-error: true
        run: |
          set -o pipefail
          npm run build:tsc 2>&1 | tee .ci/typecheck.log
      - name: Publish backend diagnostics
        if: always() && github.event_name == 'push' && github.ref_name == 'feat/issue-370-p0c-p1-knowledge-tree' && (steps.sqlite.outcome == 'failure' || steps.postgres.outcome == 'failure' || steps.backend_typecheck.outcome == 'failure')
        uses: actions/github-script@v7
        env:
          SQLITE_OUTCOME: ${{ steps.sqlite.outcome }}
          POSTGRES_OUTCOME: ${{ steps.postgres.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.backend_typecheck.outcome }}
        with:
          script: |
            const fs = require('fs');
            const readTail = (path) => {
              try {
                const text = fs.readFileSync(path, 'utf8');
                return text.slice(-12000);
              } catch {
                return '(no log)';
              }
            };
            const marker = '<!-- knowledge-tree-backend-diagnostics -->';
            const body = `${marker}\n## P0-C / P1 Backend 诊断\n\n- SQLite：\`${process.env.SQLITE_OUTCOME}\`\n- PostgreSQL schema：\`${process.env.POSTGRES_OUTCOME}\`\n- TypeScript：\`${process.env.TYPECHECK_OUTCOME}\`\n- Commit：\`${context.sha}\`\n\n<details><summary>SQLite / service test</summary>\n\n\`\`\`text\n${readTail('backend/.ci/sqlite.log')}\n\`\`\`\n</details>\n\n<details><summary>PostgreSQL schema test</summary>\n\n\`\`\`text\n${readTail('backend/.ci/postgres.log')}\n\`\`\`\n</details>\n\n<details><summary>Backend typecheck</summary>\n\n\`\`\`text\n${readTail('backend/.ci/typecheck.log')}\n\`\`\`\n</details>`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 370,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 370,
                body,
              });
            }
      - name: Enforce backend result
        if: always() && (steps.sqlite.outcome == 'failure' || steps.postgres.outcome == 'failure' || steps.backend_typecheck.outcome == 'failure')
        run: exit 1

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Knowledge tree and workspace layout tests
        run: >-
          npm run test:run --
          src/lib/__tests__/knowledgeTreeModel.test.ts
          src/lib/__tests__/editorWorkspaceLayout.test.ts
      - name: Frontend typecheck
        if: always()
        run: npx tsc -b

  report:
    if: always() && github.event_name == 'push' && github.ref_name == 'feat/issue-370-p0c-p1-knowledge-tree'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Report validation to issue 370
        uses: actions/github-script@v7
        with:
          script: |
            const backend = '${{ needs.backend.result }}';
            const frontend = '${{ needs.frontend.result }}';
            const passed = backend === 'success' && frontend === 'success';
            const marker = '<!-- knowledge-tree-p0-p1-ci -->';
            const body = `${marker}\n## P0-C / P1 自动验证${passed ? '通过 ✅' : '失败 ❌'}\n\n- Backend（SQLite、PostgreSQL schema、TypeScript）：\`${backend}\`\n- Frontend（统一树模型、布局回归、TypeScript）：\`${frontend}\`\n- Commit：\`${context.sha}\`\n- Run：${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 370,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 370,
                body,
              });
            }
