name: Codex Issue 351 One Shot

on:
  push:
    branches:
      - codex/issue-351-note-loading-ux

permissions:
  contents: write

jobs:
  finish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Finalize source
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          def load(path):
              return Path(path).read_text(encoding="utf-8-sig")

          def save(path, text):
              Path(path).write_text(text, encoding="utf-8")

          # Collapse any duplicated deferred helper caused by earlier interrupted verification runs.
          test_path = "frontend/src/lib/__tests__/noteLoadCoordinator.test.ts"
          test = load(test_path)
          deferred = '''function deferred<T>() {\n  let resolve!: (value: T) => void;\n  const promise = new Promise<T>((done) => { resolve = done; });\n  return { promise, resolve };\n}\n'''
          while test.count(deferred) > 1:
              first = test.find(deferred)
              second = test.find(deferred, first + len(deferred))
              test = test[:second] + test[second + len(deferred):]
          save(test_path, test)

          path = "frontend/src/components/EditorPane.tsx"
          text = load(path)

          def replace(old, new, label):
              global text
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected 1 occurrence, got {count}")
              text = text.replace(old, new, 1)

          def regex(pattern, replacement, label):
              global text
              text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError(f"{label}: expected 1 occurrence, got {count}")

          replace(
              'import { motion, AnimatePresence } from "framer-motion";',
              'import { motion, AnimatePresence, useReducedMotion } from "framer-motion";',
              "reduced motion import",
          )
          replace(
              '  const { activeNote, syncStatus, lastSyncedAt, noteLoading, noteLoadingState } = state;\n',
              '  const { activeNote, syncStatus, lastSyncedAt, noteLoading, noteLoadingState } = state;\n  const reduceMotion = useReducedMotion();\n',
              "reduced motion hook",
          )
          replace(
              '  const isTrashed = !!activeNote?.isTrashed;\n  const effectiveLocked = !!activeNote?.isLocked || isViewLocked || isTrashed;\n',
              '  const isTrashed = !!activeNote?.isTrashed;\n  const noteSwitchPending = !!noteLoadingState.pendingNoteId;\n  const effectiveLocked = !!activeNote?.isLocked || isViewLocked || isTrashed || noteSwitchPending;\n',
              "pending read-only",
          )

          regex(
              r'''    if \(nextTab\) \{\n      actions\.setNoteLoading\(true\);\n      api\.getNote\(nextTab\.id\)[\s\S]*?\n        \.finally\(\(\) => actions\.setNoteLoading\(false\)\);\n    \}''',
              '''    if (nextTab) {\n      void loadNote({\n        noteId: nextTab.id,\n        summary: {\n          title: nextTab.title || t("editorTabs.noTitle"),\n          notebookId: nextTab.notebookId,\n          contentFormat: nextTab.contentFormat,\n        },\n        request: () => api.getNote(nextTab.id),\n        onSuccess: (nextNote) => {\n          actions.setActiveNote(nextNote);\n          actions.openNoteTab({\n            id: nextNote.id,\n            title: nextNote.title,\n            notebookId: nextNote.notebookId,\n            workspaceId: nextNote.workspaceId,\n            contentFormat: nextNote.contentFormat,\n            isLocked: nextNote.isLocked,\n            isTrashed: nextNote.isTrashed,\n            updatedAt: nextNote.updatedAt,\n          });\n        },\n      });\n    }''',
              "trash next tab",
          )
          replace(
              '  }, [activeNote, actions, state.openNoteTabs, userPrefs.enableNoteTabs]);\n',
              '  }, [activeNote, actions, loadNote, state.openNoteTabs, t, userPrefs.enableNoteTabs]);\n',
              "trash dependencies",
          )

          regex(
              r'''  const handleOpenNote = useCallback\(async \(noteId: string\) => \{[\s\S]*?\n  \}, \[actions, t\]\);''',
              '''  const handleOpenNote = useCallback(async (noteId: string) => {\n    await loadNote({\n      noteId,\n      summary: { title: t("editor.noteLoading"), notebookId: "" },\n      request: () => api.getNote(noteId),\n      onSuccess: (note) => actions.setActiveNote(note),\n    });\n  }, [actions, loadNote, t]);''',
              "block link loader",
          )

          replace(
              '        onRetry={() => { void retryNoteLoad(); }}\n        loadingLabel=',
              '        onRetry={() => { void retryNoteLoad(); }}\n        onBack={() => actions.setMobileView("list")}\n        loadingLabel=',
              "page back",
          )
          replace(
              '      transition={{ duration: 0.15 }}\n',
              '      transition={{ duration: reduceMotion ? 0 : 0.15 }}\n',
              "content transition",
          )
          replace(
              '            transition={{ duration: 0.14, ease: "easeOut" }}\n',
              '            transition={{ duration: reduceMotion ? 0 : 0.14, ease: "easeOut" }}\n',
              "overlay transition",
          )
          replace(
              '              onRetry={() => { void retryNoteLoad(); }}\n              loadingLabel=',
              '              onRetry={() => { void retryNoteLoad(); }}\n              onBack={() => actions.setMobileView("list")}\n              loadingLabel=',
              "overlay back",
          )
          save(path, text)

          Path(".issue351-diagnostics.txt").unlink(missing_ok=True)
          Path(".issue351-verification.txt").unlink(missing_ok=True)
          Path(".github/workflows/codex-issue-351-one-shot.yml").unlink(missing_ok=True)
          PY
          git diff --check

      - name: Install and verify
        shell: bash
        run: |
          set +e
          report=.issue351-verification.txt
          : > "$report"
          cd frontend
          npm ci >> ../$report 2>&1
          install_code=$?
          echo "install_exit=$install_code" >> ../$report
          test_code=99
          build_code=99
          if [ "$install_code" -eq 0 ]; then
            npm run test:run -- src/lib/__tests__/noteLoadCoordinator.test.ts >> ../$report 2>&1
            test_code=$?
            echo "test_exit=$test_code" >> ../$report
            npm run build >> ../$report 2>&1
            build_code=$?
            echo "build_exit=$build_code" >> ../$report
          fi
          cd ..
          echo "summary install=$install_code test=$test_code build=$build_code" >> "$report"

      - name: Commit final branch state
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(editor): complete delayed note loading UX (#351)"
          git push origin HEAD:codex/issue-351-note-loading-ux
