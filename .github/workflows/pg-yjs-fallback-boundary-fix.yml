name: PostgreSQL Yjs Fallback Boundary Fix

on:
  push:
    branches:
      - issue-248-direct-db-audit
    paths:
      - .github/workflows/pg-yjs-fallback-boundary-fix.yml
      - backend/scripts/fix-yjs-fallback-seed-boundary.mjs

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: issue-248-direct-db-audit
          fetch-depth: 0

      - name: Apply fix
        run: node backend/scripts/fix-yjs-fallback-seed-boundary.mjs

      - name: Commit generated fix
        run: |
          if git diff --quiet; then
            echo "No fix required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/services/yjs.ts
          git commit -m "fix(db): route Yjs fallback seed through repository (#248)"
          git push origin HEAD:issue-248-direct-db-audit
