name: Issue 365 Shared Tree Bootstrap

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'fix/365-shared-notebook-tree'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply source patch
        run: python3 scripts/apply-issue-365.py

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Verify backend
        working-directory: backend
        run: |
          npm ci
          node --import tsx --import ./tests/setup-db-isolation.ts --test tests/shared-notebook-tree.test.ts
          npm run build:tsc

      - name: Verify frontend
        working-directory: frontend
        run: |
          npm ci
          npm run test:run -- src/lib/__tests__/sharedNotebookTree.test.ts
          npx tsc -b

      - name: Commit applied patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/routes/notebooks.ts frontend/src/components/Sidebar.tsx
          if git diff --cached --quiet; then
            echo "Patch already applied"
            exit 0
          fi
          git commit -m "fix(collaboration): render complete shared notebook tree"
          git push origin HEAD:${{ github.head_ref }}
