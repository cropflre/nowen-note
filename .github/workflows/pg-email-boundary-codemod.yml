name: PostgreSQL Email Boundary Codemod

on:
  push:
    branches:
      - issue-248-direct-db-audit
    paths:
      - .github/workflows/pg-email-boundary-codemod.yml
      - backend/scripts/apply-email-service-boundary-codemod.mjs

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: issue-248-direct-db-audit
          fetch-depth: 0

      - name: Apply codemod
        run: node backend/scripts/apply-email-service-boundary-codemod.mjs

      - name: Commit generated email boundary changes
        run: |
          if git diff --quiet; then
            echo "No codemod changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/services/email.ts
          git commit -m "refactor(db): move SMTP persistence behind repository (#248)"
          git push origin HEAD:issue-248-direct-db-audit
