name: Issue 348 Task Completion Order

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/issue-348-task-order.mjs"
      - ".github/workflows/issue-348-task-order.yml"
      - "frontend/src/components/TaskCenterImpl.tsx"
      - "frontend/src/components/tasks/taskCompletionOrder.ts"
      - "frontend/src/components/tasks/__tests__/taskCompletionOrder.test.ts"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Generate implementation
        run: node scripts/issue-348-task-order.mjs
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run task completion ordering tests
        working-directory: frontend
        run: npm run test:run -- src/components/tasks/__tests__/taskCompletionOrder.test.ts
      - name: Frontend typecheck
        working-directory: frontend
        run: npx tsc -b
      - name: Commit verified implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/components/TaskCenterImpl.tsx
          git add frontend/src/components/tasks/taskCompletionOrder.ts
          git add frontend/src/components/tasks/__tests__/taskCompletionOrder.test.ts
          git commit -m "feat(tasks): move completed tasks below pending tasks"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
