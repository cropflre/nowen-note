name: Validate PG round-trip batch C-1

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    if: github.head_ref == 'pg-validation-roundtrip-c1'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nowen
          POSTGRES_PASSWORD: nowen_ci_password
          POSTGRES_DB: nowen_note_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nowen -d nowen_note_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      TEST_PG_DATABASE_URL: postgres://nowen:nowen_ci_password@127.0.0.1:5432/nowen_note_test
      DATABASE_URL: postgres://nowen:nowen_ci_password@127.0.0.1:5432/nowen_note_test
      IMAGE_HOSTING_ENCRYPTION_KEY: pg-roundtrip-c1-validation-key-2026

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --no-audit --no-fund

      - name: TypeScript, audits and SQL dialect
        working-directory: backend
        run: |
          npm run build:tsc -- --noEmit
          npm run audit:sqlite-boundaries
          npm run audit:pg-schema-parity
          node --import tsx --test --test-concurrency=1 tests/sql-dialect.test.ts

      - name: Full SQLite regression
        working-directory: backend
        env:
          DB_DRIVER: sqlite
          DATABASE_URL: ""
          TEST_PG_DATABASE_URL: ""
        run: npm run test:serial

      - name: Real PostgreSQL migrations and repositories
        working-directory: backend
        run: >-
          node --import tsx --test --test-concurrency=1
          tests/postgres-adapter.test.ts
          tests/postgres-migrations.test.ts
          tests/roundtrip-import-batches-repository-pg.test.ts

      - name: Production bundle and migration packaging
        working-directory: backend
        run: |
          npm run build
          test -f dist/postgres/migrations/0009_roundtrip_import_resource_links.sql
          test -f dist/postgres/migrations/0010_roundtrip_import_batches.sql
